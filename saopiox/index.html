<!DOCTYPE html>

<body>

<div id="app" class="estado-inicial">

  <!-- ══ ESTADO INICIAL ══ -->
  <section id="hero" aria-label="Busca no Catecismo de São Pio X">

    <img src="brasao-piox.webp" alt="Brasão de São Pio X" class="brasao-piox" width="441" height="516">

    <h1 class="titulo-piox">Catecismo Maior de<br>São Pio X</h1>
    <p class="tagline">994 perguntas e respostas sobre a fé católica</p>

    <div class="campo-busca-container" role="search">
      <svg class="icone-busca" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

        type="text"
        id="campo-busca"
        autocomplete="off"
        spellcheck="false"
        placeholder="Busque por batismo, graça, sacramentos…"
        aria-label="Buscar no Catecismo de São Pio X"
      >
      <button id="botao-limpar" type="button" class="oculto" aria-label="Limpar busca">×</button>
    </div>

    <nav id="temas-rapidos" aria-label="Temas sugeridos">
      <button type="button" data-tema="sacramentos">Sacramentos</button>
      <button type="button" data-tema="batismo">Batismo</button>
      <button type="button" data-tema="eucaristia">Eucaristia</button>
      <button type="button" data-tema="pecado">Pecado</button>
      <button type="button" data-tema="graça">Graça</button>
      <button type="button" data-tema="oração">Oração</button>
      <button type="button" data-tema="maria">Maria</button>
      <button type="button" data-tema="mandamentos">Mandamentos</button>
    </nav>

    <button id="btn-ler-hero" type="button" aria-label="Ler o Catecismo">

        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
      </svg>

    </button>

    <a href="/" class="btn-outro-catecismo" aria-label="Catecismo da Igreja Católica">
      ← Catecismo da Igreja Católica
    </a>

  </section>

  <!-- ══ ESTADO DE BUSCA ══ -->

          <polyline points="9 21 9 12 15 12 15 21"/>
        </svg>
      </a>
      <div id="busca-topo-wrapper" class="campo-busca-container" role="search">
        <svg class="icone-busca" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.2-5.2m0 0a7.5 7.5 0 1 0-10.6-10.6 7.5 7.5 0 0 0 10.6 10.6z"/>
        </svg>

      <button id="btn-ler-header" type="button" aria-label="Modo leitura">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">

        </svg>

    </div>
  </header>

    <!-- Painel esquerdo -->

        <button id="btn-resumir" class="oculto" type="button" aria-label="Resumir com IA">

        </div>
        <div id="ai-resumo-corpo"></div>
      </div>

      <div id="lista-resultados" role="listbox" aria-label="Questões encontradas" tabindex="0"></div>

      <div id="sem-resultados" class="oculto" role="status">
        <strong>Nenhum resultado encontrado.</strong>
        Tente termos como "graça", "batismo", "pecado" ou "fé".
      </div>
    </aside>

    <!-- Painel direito -->
    <article id="painel-conteudo" aria-label="Questão do Catecismo">
      <button id="btn-fechar-conteudo" type="button" aria-label="Voltar aos resultados">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M19 12H5M12 5l-7 7 7 7"/>

        Resultados

      <div class="placeholder" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25"/>
        </svg>

    </article>

    <!-- Nav prev/next -->
    <div id="nav-paragrafo">
      <button id="nav-anterior" type="button" class="oculto" aria-label="Questão anterior">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 15l-6-6-6 6"/></svg>
      </button>
      <button id="nav-proximo" type="button" class="oculto" aria-label="Próxima questão">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 9l6 6 6-6"/></svg>
      </button>
    </div>

    <!-- Mobile nav -->
    <div id="mobile-nav-bar" aria-hidden="true">
      <div id="mobile-nav-esquerda">
        <button id="mobile-btn-resultados" type="button">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M19 12H5M12 5l-7 7 7 7"/>

        <button id="mobile-btn-resumir" type="button" aria-label="Resumir com IA">

          RESUMO POR IA

      <span id="mobile-nav-info"></span>
      <div id="mobile-nav-arrows">
        <button id="mobile-btn-anterior" type="button" aria-label="Anterior" disabled>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 15l-6-6-6 6"/></svg>
        </button>
        <button id="mobile-btn-proximo" type="button" aria-label="Próximo" disabled>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 9l6 6 6-6"/></svg>
        </button>
      </div>
    </div>

  </div><!-- #painel-busca -->

  <!-- ══ MODO LEITURA ══ -->
  <div id="leitor-container" aria-label="Modo leitura">

    <header id="leitor-header">
      <button id="leitor-btn-toc" class="leitor-btn-icon" type="button" aria-label="Índice" aria-expanded="true">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>

      <div id="leitor-breadcrumb"></div>

      <button id="leitor-fechar" class="leitor-btn-icon" type="button" aria-label="Fechar modo leitura">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9.5z"/>
          <polyline points="9 21 9 12 15 12 15 21"/>
        </svg>
      </button>
    </header>

    <div id="leitor-body">
      <nav id="leitor-toc" aria-label="Índice do Catecismo"></nav>
      <div id="leitor-toc-overlay" aria-hidden="true"></div>

      <div id="leitor-main">
        <div id="leitor-texto" aria-live="polite"></div>

        <div id="leitor-nav-caps">
          <button id="leitor-anterior" class="leitor-nav-btn" type="button">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg>
            <span>Capítulo anterior</span>
          </button>
          <button id="leitor-proximo" class="leitor-nav-btn" type="button">
            <span>Próximo capítulo</span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 18l6-6-6-6"/></svg>
          </button>
        </div>
      </div>
    </div>

  </div><!-- #leitor-container -->

</div><!-- #app -->

<!-- Versão -->
<span id="app-version" aria-hidden="true"></span>

<style>
#barra-flutuante{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);z-index:1000;display:flex;align-items:center;gap:.75rem;background:#c39e27;border-radius:28px 28px 0 0;padding:.85rem 1.25rem 1.1rem;box-shadow:0 -4px 24px rgba(0,0,0,.12);transition:transform .5s cubic-bezier(.25,.46,.45,.94)}

.bf-item:hover .bf-icone{transform:scale(1.1);background:rgba(255,255,255,.9)}
.bf-item:nth-child(1):hover .bf-icone{color:#2d6a4f}
.bf-item:nth-child(2):hover .bf-icone{color:#2c4a8c}
.bf-item:nth-child(3):hover .bf-icone{color:#8c4a2c}
.bf-item:nth-child(4):hover .bf-icone{color:#8c2c3e}
.bf-item:nth-child(5):hover .bf-icone{color:#25D366}
.bf-item.ativo .bf-icone{background:rgba(255,255,255,.95);color:#2c4a8c}
.bf-label{font-size:.62rem;font-weight:600;letter-spacing:.02em;color:rgba(255,255,255,0);transition:color .15s;white-space:nowrap}
.bf-item:hover .bf-label{color:rgba(255,255,255,.95)}
</style>
<script>
(function(){const b=document.getElementById('barra-flutuante');const Z=80;let t;function show(){clearTimeout(t);b.classList.add('visivel')}function hide(d=600){clearTimeout(t);t=setTimeout(()=>b.classList.remove('visivel'),d)}show();hide(3000);document.addEventListener('mousemove',e=>{if(e.clientY>window.innerHeight-Z){show()}else if(!b.matches(':hover')){hide()}});b.addEventListener('mouseenter',show);b.addEventListener('mouseleave',()=>hide())})();
</script>
