<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Liturgia do Dia — Catecismo da Igreja Católica</title>
  <meta name="description" content="Leituras litúrgicas do dia, com texto completo em português.">

  <link rel="icon" type="image/png" href="../assets/favicon.png">
  <link rel="apple-touch-icon" href="../assets/favicon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&display=swap">

  <link rel="stylesheet" href="../assets/css/main.css">
  <style>
    /* ── Base ─────────────────────────────────────────────────────────────── */
    html, body {
      background: var(--color-bg);
      min-height: 100%;
    }

    body {
      font-family: var(--font-sans);
      color: var(--color-text);
    }

    /* ── Layout dois painéis ──────────────────────────────────────────────── */
    .lp-wrap {
      display: flex;
      min-height: 100vh;
      max-width: 1080px;
      margin: 0 auto;
    }

    /* ── Sidebar ──────────────────────────────────────────────────────────── */
    .lp-sidebar {
      width: 240px;
      flex-shrink: 0;
      padding: 2rem 1.5rem 3rem;
      border-right: 1px solid var(--color-border);
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .lp-back {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--color-muted);
      text-decoration: none;
      font-size: 0.8rem;
      margin-bottom: 2rem;
      transition: color 0.15s;
    }
    .lp-back:hover { color: var(--color-primary); }
    .lp-back svg { flex-shrink: 0; }

    .lp-titulo {
      font-family: var(--font-serif);
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--color-text);
      margin: 0 0 0.4rem;
      line-height: 1.3;
    }

    .lp-data {
      font-size: 0.78rem;
      color: var(--color-muted);
      margin-bottom: 0.5rem;
      line-height: 1.5;
    }

    .tempo-badge {
      display: inline-block;
      background: rgba(197,160,40,0.12);
      color: var(--color-accent-dk);
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 0.2em 0.6em;
      border-radius: 4px;
      margin-bottom: 2rem;
    }

    /* Nav de leituras */
    .lp-nav {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
      margin: 0;
      padding: 0;
    }

    .lp-nav a {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.55rem 0.75rem;
      border-radius: 6px;
      font-size: 0.85rem;
      color: var(--color-muted);
      text-decoration: none;
      transition: background 0.12s, color 0.12s;
    }

    .lp-nav a:hover {
      background: rgba(26,60,46,0.06);
      color: var(--color-text);
    }

    .lp-nav a.ativa {
      background: rgba(26,60,46,0.08);
      color: var(--color-primary);
      font-weight: 600;
    }

    .lp-nav .nav-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.4;
      flex-shrink: 0;
    }

    .lp-nav a.ativa .nav-dot { opacity: 1; }

    /* Botão reflexão no sidebar */
    .lp-sidebar-footer {
      margin-top: auto;
      padding-top: 2rem;
    }

    #btn-reflexao {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.45rem;
      background: none;
      border: 1.5px solid var(--color-primary);
      color: var(--color-primary);
      font-family: var(--font-sans);
      font-size: 0.8rem;
      font-weight: 600;
      padding: 0.65rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    #btn-reflexao:hover:not(:disabled) {
      background: var(--color-primary);
      color: #fff;
    }

    #btn-reflexao:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── Conteúdo principal ───────────────────────────────────────────────── */
    .lp-main {
      flex: 1;
      padding: 2.5rem 2.5rem 5rem;
      min-width: 0;
    }

    /* Cards de leitura */
    .leitura-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 12px;
      padding: 1.75rem 2rem;
      margin-bottom: 1.25rem;
      scroll-margin-top: 1.5rem;
    }

    .leitura-card.card-evangelho {
      border-color: rgba(26,60,46,0.2);
      box-shadow: 0 2px 12px rgba(26,60,46,0.06);
    }

    .leitura-label {
      font-family: var(--font-sans);
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--color-muted);
      margin-bottom: 0.3rem;
    }

    .card-evangelho .leitura-label { color: var(--color-accent-dk); }

    .leitura-ref {
      font-family: var(--font-serif);
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--color-text);
      margin-bottom: 1.25rem;
    }

    .leitura-texto {
      font-family: var(--font-serif);
      font-size: 1.05rem;
      line-height: 1.85;
      color: var(--color-text);
    }

    .vers-num {
      font-size: 0.65rem;
      font-family: var(--font-sans);
      color: var(--color-muted);
      vertical-align: super;
      margin-right: 0.2em;
      user-select: none;
    }

    .loading, .erro {
      font-family: var(--font-sans);
      color: var(--color-muted);
      text-align: center;
      padding: 3rem 0;
      font-size: 0.9rem;
    }

    /* ── Reflexão (dentro do card Evangelho) ─────────────────────────────── */
    #area-reflexao {
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--color-border);
    }

    #reflexao-conteudo { margin-top: 1.5rem; }

    .reflexao-bloco { margin-bottom: 1.5rem; }

    .reflexao-bloco-label {
      font-family: var(--font-sans);
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--color-muted);
      margin-bottom: 0.4rem;
    }

    .termo-grego {
      font-family: var(--font-serif);
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--color-primary);
    }

    .termo-transliteracao {
      font-style: italic;
      color: var(--color-muted);
      font-size: 0.95rem;
      margin-left: 0.35rem;
      font-family: var(--font-serif);
    }

    .reflexao-texto {
      font-family: var(--font-serif);
      font-size: 1rem;
      line-height: 1.75;
      color: var(--color-text);
      margin-top: 0.3rem;
    }

    .cic-refs {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 0.6rem;
    }

    .cic-ref-pill {
      font-family: var(--font-sans);
      font-size: 0.78rem;
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: 6px;
      padding: 0.2em 0.55em;
      color: var(--color-primary);
      text-decoration: none;
      transition: background 0.12s;
    }

    .cic-ref-pill:hover { background: rgba(197,160,40,0.1); }

    /* ── Mobile tabs ──────────────────────────────────────────────────────── */
    .lp-tabs {
      display: none;
      overflow-x: auto;
      gap: 0.25rem;
      padding: 1rem 1.25rem 0;
      scrollbar-width: none;
      border-bottom: 1px solid var(--color-border);
      background: var(--color-surface);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .lp-tabs::-webkit-scrollbar { display: none; }

    .lp-tabs a {
      display: inline-block;
      white-space: nowrap;
      padding: 0.5rem 0.9rem;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--color-muted);
      text-decoration: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.12s, border-color 0.12s;
    }

    .lp-tabs a.ativa {
      color: var(--color-primary);
      border-bottom-color: var(--color-primary);
      font-weight: 600;
    }

    /* ── Responsivo ───────────────────────────────────────────────────────── */
    @media (max-width: 700px) {
      .lp-wrap { flex-direction: column; }

      .lp-sidebar {
        position: static;
        height: auto;
        width: 100%;
        border-right: none;
        border-bottom: none;
        padding: 1.5rem 1.25rem 0;
        flex-direction: column;
        gap: 0;
      }

      .lp-nav, .lp-sidebar-footer { display: none; }
      .lp-tabs { display: flex; }

      .lp-main { padding: 1.25rem 1.25rem 4rem; }

      .leitura-card { padding: 1.25rem 1.25rem; }
    }
  </style>
</head>
<body>

<div class="lp-wrap">

  <!-- ── Sidebar ─────────────────────────────────────────────────────────── -->
  <aside class="lp-sidebar">
    <a href="../" class="lp-back" aria-label="Voltar ao Catecismo">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
      Catecismo da Igreja Católica
    </a>

    <h1 class="lp-titulo">Liturgia<br>do Dia</h1>
    <p class="lp-data" id="lp-data">Carregando…</p>
    <span class="tempo-badge" id="lp-tempo" style="display:none"></span>

    <ul class="lp-nav" id="lp-nav" aria-label="Leituras do dia">
      <!-- preenchido pelo JS -->
    </ul>

    <div class="lp-sidebar-footer" id="area-reflexao" style="display:none">
      <button id="btn-reflexao" type="button">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2z"/><path d="M12 8v4M12 16h.01"/></svg>
        Explicar o Evangelho
      </button>
    </div>
  </aside>

  <!-- ── Tabs mobile ─────────────────────────────────────────────────────── -->
  <nav class="lp-tabs" id="lp-tabs" aria-label="Leituras"></nav>

  <!-- ── Conteúdo ────────────────────────────────────────────────────────── -->
  <main class="lp-main" id="conteudo">
    <p class="loading">Buscando leituras do dia…</p>
  </main>

</div>

<script type="module">

// ── Mapeamento livros inglês → abreviação PT ──────────────────────────────────
const EN_TO_ABR = {
  "genesis":"Gn","exodus":"Ex","leviticus":"Lv","numbers":"Nm","deuteronomy":"Dt",
  "joshua":"Js","judges":"Jz","ruth":"Rt","1 samuel":"1Sm","2 samuel":"2Sm",
  "1 kings":"1Rs","2 kings":"2Rs","1 chronicles":"1Cr","2 chronicles":"2Cr",
  "ezra":"Esd","nehemiah":"Ne","tobit":"Tb","judith":"Jt","esther":"Est",
  "job":"Jó","psalm":"Sl","psalms":"Sl","1 maccabees":"1Mac","2 maccabees":"2Mac",
  "proverbs":"Pr","ecclesiastes":"Ecl","song of songs":"Ct","song of solomon":"Ct",
  "wisdom":"Sb","sirach":"Sir","ecclesiasticus":"Sir","isaiah":"Is","jeremiah":"Jr",
  "lamentations":"Lm","baruch":"Bar","ezekiel":"Ez","daniel":"Dn","hosea":"Os",
  "joel":"Jl","amos":"Am","obadiah":"Ab","jonah":"Jon","micah":"Mq","nahum":"Na",
  "habakkuk":"Hab","zephaniah":"Sf","haggai":"Ag","zechariah":"Zc","malachi":"Ml",
  "matthew":"Mt","mark":"Mc","luke":"Lc","john":"Jo","acts":"At","romans":"Rm",
  "1 corinthians":"1Cor","2 corinthians":"2Cor","galatians":"Gl","ephesians":"Ef",
  "philippians":"Fl","colossians":"Cl","1 thessalonians":"1Ts","2 thessalonians":"2Ts",
  "1 timothy":"1Tm","2 timothy":"2Tm","titus":"Tt","philemon":"Fm","hebrews":"Hb",
  "james":"Tg","1 peter":"1Pd","2 peter":"2Pd","1 john":"1Jo","2 john":"2Jo",
  "3 john":"3Jo","jude":"Jd","revelation":"Ap","apocalypse":"Ap",
};

const NOMES_PT = {
  "Gn":"Gênesis","Ex":"Êxodo","Lv":"Levítico","Nm":"Números","Dt":"Deuteronômio",
  "Js":"Josué","Jz":"Juízes","Rt":"Rute","1Sm":"1 Samuel","2Sm":"2 Samuel",
  "1Rs":"1 Reis","2Rs":"2 Reis","1Cr":"1 Crônicas","2Cr":"2 Crônicas",
  "Esd":"Esdras","Ne":"Neemias","Tb":"Tobias","Jt":"Judite","Est":"Ester",
  "Jó":"Jó","Sl":"Salmos","1Mac":"1 Macabeus","2Mac":"2 Macabeus",
  "Pr":"Provérbios","Ecl":"Eclesiastes","Ct":"Cântico dos Cânticos",
  "Sb":"Sabedoria","Sir":"Eclesiástico","Is":"Isaías","Jr":"Jeremias",
  "Lm":"Lamentações","Bar":"Baruc","Ez":"Ezequiel","Dn":"Daniel","Os":"Oséias",
  "Jl":"Joel","Am":"Amós","Ab":"Abdias","Jon":"Jonas","Mq":"Miquéias",
  "Na":"Naum","Hab":"Habacuc","Sf":"Sofonias","Ag":"Ageu","Zc":"Zacarias",
  "Ml":"Malaquias","Mt":"São Mateus","Mc":"São Marcos","Lc":"São Lucas",
  "Jo":"São João","At":"Atos dos Apóstolos","Rm":"Romanos",
  "1Cor":"1 Coríntios","2Cor":"2 Coríntios","Gl":"Gálatas","Ef":"Efésios",
  "Fl":"Filipenses","Cl":"Colossenses","1Ts":"1 Tessalonicenses","2Ts":"2 Tessalonicenses",
  "1Tm":"1 Timóteo","2Tm":"2 Timóteo","Tt":"Tito","Fm":"Filêmon","Hb":"Hebreus",
  "Tg":"Tiago","1Pd":"1 Pedro","2Pd":"2 Pedro","1Jo":"1 João","2Jo":"2 João",
  "3Jo":"3 João","Jd":"Judas","Ap":"Apocalipse",
};

const SEASONS_PT = {
  "Lent":"Quaresma","Advent":"Advento","Christmas":"Natal",
  "Easter":"Páscoa","Ordinary Time":"Tempo Comum",
};

const _cache = new Map();

async function carregarLivro(abr) {
  if (_cache.has(abr)) return _cache.get(abr);
  const r = await fetch(`../data/biblia/${encodeURIComponent(abr)}.json`);
  if (!r.ok) return null;
  const d = await r.json();
  _cache.set(abr, d);
  return d;
}

function parseRef(ref) {
  const m = ref.trim().match(/^(.+?)\s+(\d+):(.+)$/);
  if (!m) return null;
  const bookKey = m[1].toLowerCase().replace(/\.$/, '');
  let abr = EN_TO_ABR[bookKey];
  if (!abr) {
    for (const [k, v] of Object.entries(EN_TO_ABR)) {
      if (bookKey.startsWith(k) || k.startsWith(bookKey)) { abr = v; break; }
    }
  }
  if (!abr) return null;
  const cap = m[2];
  const versStr = m[3].replace(/(\d+)[a-z]/g, '$1');
  const vers = [];
  for (const part of versStr.split(',')) {
    const p = part.trim();
    if (p.includes('-')) {
      const [a, b] = p.split('-').map(Number);
      for (let i = a; i <= b; i++) vers.push(i);
    } else {
      const n = parseInt(p);
      if (!isNaN(n)) vers.push(n);
    }
  }
  return { abr, cap, vers };
}

function refPT(parsed) {
  const nome = NOMES_PT[parsed.abr] ?? parsed.abr;
  const groups = [];
  let start = parsed.vers[0], prev = parsed.vers[0];
  for (let i = 1; i <= parsed.vers.length; i++) {
    if (i === parsed.vers.length || parsed.vers[i] !== prev + 1) {
      groups.push(start === prev ? `${start}` : `${start}-${prev}`);
      if (i < parsed.vers.length) { start = parsed.vers[i]; prev = parsed.vers[i]; }
    } else { prev = parsed.vers[i]; }
  }
  return `${nome} ${parsed.cap},${groups.join('.')}`;
}

async function renderLeitura(label, refEn, id, isGospel = false) {
  if (!refEn) return '';
  const parsed = parseRef(refEn);
  const refDisplay = parsed ? refPT(parsed) : refEn;

  let textHtml = '';
  if (parsed) {
    const livro = await carregarLivro(parsed.abr);
    if (livro) {
      const cap = livro[parsed.cap] ?? {};
      const linhas = parsed.vers
        .map(v => cap[String(v)] ? `<span class="vers-num">${v}</span>${cap[String(v)]} ` : '')
        .filter(Boolean);
      if (linhas.length) textHtml = `<p>${linhas.join('')}</p>`;
    }
  }

  if (!textHtml) textHtml = `<p class="erro" style="padding:0;text-align:left">Texto não disponível para esta leitura.</p>`;

  const gospelExtra = isGospel ? `<div id="reflexao-conteudo"></div>` : '';

  return `
    <div class="leitura-card${isGospel ? ' card-evangelho' : ''}" id="${id}">
      <div class="leitura-label">${label}</div>
      <div class="leitura-ref">${refDisplay}</div>
      <div class="leitura-texto">${textHtml}</div>
      ${gospelExtra}
    </div>
  `;
}

function construirNav(leituras) {
  const navEl  = document.getElementById('lp-nav');
  const tabsEl = document.getElementById('lp-tabs');
  navEl.innerHTML  = '';
  tabsEl.innerHTML = '';

  leituras.forEach(({ label, id }, i) => {
    const li = document.createElement('li');
    li.innerHTML = `<a href="#${id}"${i === 0 ? ' class="ativa"' : ''}><span class="nav-dot"></span>${label}</a>`;
    navEl.appendChild(li);

    const a = document.createElement('a');
    a.href = `#${id}`;
    a.textContent = label;
    if (i === 0) a.classList.add('ativa');
    tabsEl.appendChild(a);
  });

  // Highlight ao scroll
  const cards = leituras.map(({ id }) => document.getElementById(id)).filter(Boolean);
  const allLinks = [...navEl.querySelectorAll('a'), ...tabsEl.querySelectorAll('a')];

  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        allLinks.forEach(a => a.classList.toggle('ativa', a.getAttribute('href') === `#${e.target.id}`));
      }
    });
  }, { threshold: 0.3 });

  cards.forEach(c => obs.observe(c));
}

async function init() {
  const hoje = new Date();
  const ano  = hoje.getFullYear();
  const mm   = String(hoje.getMonth() + 1).padStart(2, '0');
  const dd   = String(hoje.getDate()).padStart(2, '0');

  const url = `https://cpbjr.github.io/catholic-readings-api/readings/${ano}/${mm}-${dd}.json`;

  let raw;
  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error();
    raw = await r.json();
  } catch {
    document.getElementById('conteudo').innerHTML = `<p class="erro">Leituras de hoje não disponíveis.</p>`;
    document.getElementById('lp-data').textContent = '';
    return;
  }

  const dataFmt = hoje.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
  const season  = SEASONS_PT[raw.season] ?? raw.season ?? '';

  document.getElementById('lp-data').textContent = dataFmt;
  if (season) {
    const badge = document.getElementById('lp-tempo');
    badge.textContent = season;
    badge.style.display = '';
  }

  const { firstReading, psalm, secondReading, gospel } = raw.readings ?? {};

  const leituras = [
    { label: '1ª Leitura', ref: firstReading, id: 'primeira-leitura' },
    { label: 'Salmo',      ref: psalm,         id: 'salmo' },
    secondReading ? { label: '2ª Leitura', ref: secondReading, id: 'segunda-leitura' } : null,
    { label: 'Evangelho',  ref: gospel,         id: 'evangelho' },
  ].filter(Boolean);

  const partes = await Promise.all(
    leituras.map(({ label, ref, id }) => renderLeitura(label, ref, id, id === 'evangelho'))
  );

  document.getElementById('conteudo').innerHTML = partes.join('');
  construirNav(leituras);

  if (gospel) {
    const parsedGospel = parseRef(gospel);
    if (parsedGospel) {
      window._liturgiaData = {
        data: `${ano}-${mm}-${dd}`,
        evangelhoRef: refPT(parsedGospel),
        gospel, parsedGospel,
      };
      document.getElementById('area-reflexao').style.display = '';
      iniciarReflexao();
    }
  }
}

// ── Reflexão via Grok ─────────────────────────────────────────────────────────
async function iniciarReflexao() {
  const btn = document.getElementById('btn-reflexao');
  const { data, evangelhoRef, parsedGospel } = window._liturgiaData;

  // Cache estático primeiro
  try {
    const r = await fetch(`../data/liturgia/${data}-reflexao.json`);
    if (r.ok) {
      renderReflexao(await r.json());
      btn.style.display = 'none';
      return;
    }
  } catch { /* mostra botão */ }

  btn.addEventListener('click', async () => {
    btn.disabled = true;
    btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg> Gerando…`;

    const livro = await carregarLivro(parsedGospel.abr);
    const cap   = livro?.[parsedGospel.cap] ?? {};
    const texto = parsedGospel.vers.map(v => cap[String(v)] ?? '').filter(Boolean).join(' ');

    try {
      const r = await fetch('/api/liturgia-reflexao', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ data, evangelhoRef, evangelhoTexto: texto }),
      });
      if (!r.ok) throw new Error(`Erro ${r.status}`);
      renderReflexao(await r.json());
      btn.style.display = 'none';
    } catch {
      btn.disabled = false;
      btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg> Tentar novamente`;
      const out = document.getElementById('reflexao-conteudo');
      if (out) out.innerHTML = `<p style="color:var(--color-muted);font-size:0.85rem;margin-top:1rem">Não foi possível gerar. Tente novamente.</p>`;
    }
  });
}

function renderReflexao(r) {
  const out = document.getElementById('reflexao-conteudo');
  if (!out) return;
  const { termo_grego: t, catecismo: c, fato_curioso: f } = r;

  const refs = (c?.paragrafos ?? []).map(n =>
    `<a class="cic-ref-pill" href="/#paragrafo-${n}" title="Abrir §${n} no Catecismo">§${n}</a>`
  ).join('');

  // Insere reflexão dentro do card do Evangelho
  const card = document.getElementById('evangelho');
  if (card && !card.querySelector('.reflexao-sep')) {
    const sep = document.createElement('div');
    sep.className = 'reflexao-sep';
    sep.style.cssText = 'margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid var(--color-border)';
    card.appendChild(sep);
  }

  out.innerHTML = `
    <div class="reflexao-bloco">
      <div class="reflexao-bloco-label">Termo grego</div>
      <div>
        <span class="termo-grego">${t?.termo ?? ''}</span>
        <span class="termo-transliteracao">${t?.transliteracao ?? ''}</span>
      </div>
      <p class="reflexao-texto">${t?.significado ?? ''}</p>
    </div>
    <div class="reflexao-bloco">
      <div class="reflexao-bloco-label">No Catecismo</div>
      <p class="reflexao-texto">${c?.conexao ?? ''}</p>
      ${refs ? `<div class="cic-refs">${refs}</div>` : ''}
    </div>
    <div class="reflexao-bloco">
      <div class="reflexao-bloco-label">Fato curioso</div>
      <p class="reflexao-texto">${f ?? ''}</p>
    </div>
  `;
}

init();
</script>

</body>
</html>
