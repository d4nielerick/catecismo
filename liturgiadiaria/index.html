<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Liturgia do Dia — Catecismo da Igreja Católica</title>
  <meta name="description" content="Leituras litúrgicas do dia, com texto completo em português.">

  <link rel="icon" type="image/png" href="../assets/favicon.png">
  <link rel="apple-touch-icon" href="../assets/favicon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&display=swap">

  <link rel="stylesheet" href="../assets/css/main.css">
  <style>
    /* ── Base ─────────────────────────────────────────────────────────────── */
    html, body {
      background: var(--color-bg);
      min-height: 100%;
    }

    body {
      font-family: var(--font-sans);
      color: var(--color-text);
    }

    /* ── Layout dois painéis ──────────────────────────────────────────────── */
    .lp-wrap {
      display: flex;
      min-height: 100vh;
      max-width: 1080px;
      margin: 0 auto;
    }

    /* ── Sidebar ──────────────────────────────────────────────────────────── */
    .lp-sidebar {
      width: 240px;
      flex-shrink: 0;
      padding: 2rem 1.5rem 3rem;
      border-right: 1px solid var(--color-border);
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .lp-back {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--color-muted);
      text-decoration: none;
      font-size: 0.8rem;
      margin-bottom: 2rem;
      transition: color 0.15s;
    }
    .lp-back:hover { color: var(--color-primary); }
    .lp-back svg { flex-shrink: 0; }

    .lp-titulo {
      font-family: var(--font-serif);
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--color-text);
      margin: 0 0 0.4rem;
      line-height: 1.3;
    }

    .lp-data {
      font-size: 0.78rem;
      color: var(--color-muted);
      margin-bottom: 0.5rem;
      line-height: 1.5;
    }

    .tempo-badge {
      display: inline-block;
      background: rgba(197,160,40,0.12);
      color: var(--color-accent-dk);
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 0.2em 0.6em;
      border-radius: 4px;
      margin-bottom: 2rem;
    }

    /* Nav de leituras */
    .lp-nav {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
      margin: 0;
      padding: 0;
    }

    .lp-nav a {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.55rem 0.75rem;
      border-radius: 6px;
      font-size: 0.85rem;
      color: var(--color-muted);
      text-decoration: none;
      transition: background 0.12s, color 0.12s;
    }

    .lp-nav a:hover {
      background: rgba(26,60,46,0.06);
      color: var(--color-text);
    }

    .lp-nav a.ativa {
      background: rgba(26,60,46,0.08);
      color: var(--color-primary);
      font-weight: 600;
    }

    .lp-nav .nav-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.4;
      flex-shrink: 0;
    }

    .lp-nav a.ativa .nav-dot { opacity: 1; }

    /* Botão reflexão no sidebar */
    .lp-sidebar-footer {
      margin-top: auto;
      padding-top: 2rem;
    }

    #btn-reflexao {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.45rem;
      background: none;
      border: 1.5px solid var(--color-primary);
      color: var(--color-primary);
      font-family: var(--font-sans);
      font-size: 0.8rem;
      font-weight: 600;
      padding: 0.65rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    #btn-reflexao:hover:not(:disabled) {
      background: var(--color-primary);
      color: #fff;
    }

    #btn-reflexao:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── Conteúdo principal ───────────────────────────────────────────────── */
    .lp-main {
      flex: 1;
      padding: 2.5rem 2.5rem 5rem;
      min-width: 0;
    }

    /* Cards de leitura */
    .leitura-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 12px;
      padding: 1.75rem 2rem;
      margin-bottom: 1.25rem;
      scroll-margin-top: 1.5rem;
    }

    .leitura-card.card-evangelho {
      border-color: rgba(26,60,46,0.2);
      box-shadow: 0 2px 12px rgba(26,60,46,0.06);
    }

    .leitura-label {
      font-family: var(--font-sans);
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--color-muted);
      margin-bottom: 0.3rem;

    .card-evangelho .leitura-label { color: var(--color-accent-dk); }

    .leitura-ref {
      font-family: var(--font-serif);
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--color-text);
      margin-bottom: 1.25rem;
    }

    .leitura-texto {
      font-family: var(--font-serif);
      font-size: 1.05rem;
      line-height: 1.85;
      color: var(--color-text);
    }

    .vers-num {
      font-size: 0.65rem;
      font-family: var(--font-sans);
      color: var(--color-muted);
      vertical-align: super;
      margin-right: 0.2em;
      user-select: none;
    }

    /* ── Salmo ────────────────────────────────────────────────────────────── */
    .salmo-refrao {
      background: rgba(197,160,40,0.07);
      border-left: 2px solid var(--color-accent);
      border-radius: 0 6px 6px 0;
      padding: 0.6rem 1rem;
      margin-bottom: 1.25rem;
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 1rem;
      line-height: 1.7;
      color: var(--color-text);
    }

    .salmo-r-label {
      font-style: normal;
      font-weight: 600;
      color: var(--color-accent-dk);
      margin-right: 0.4rem;
    }

    .salmo-estrofe {
      font-family: var(--font-serif);
      font-size: 1.05rem;
      line-height: 1.85;
      color: var(--color-text);
      margin-bottom: 0.25rem;
    }

    .salmo-r-sep {
      font-family: var(--font-sans);
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--color-accent-dk);
      margin: 0.75rem 0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .salmo-r-sep::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--color-border);
    }

    .loading, .erro {
      font-family: var(--font-sans);
      color: var(--color-muted);
      text-align: center;
      padding: 3rem 0;
      font-size: 0.9rem;
    }

    /* ── Reflexão IA ──────────────────────────────────────────────────────── */
    #reflexao-conteudo { margin-top: 1.5rem; }

    .reflexao-card {
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: 10px;
      padding: 1.25rem 1.5rem 1.25rem;
    }

    .ia-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-family: var(--font-sans);
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--color-muted);
      margin-bottom: 1rem;
    }

    .ia-badge svg { opacity: 0.5; }

    .reflexao-p {
      font-family: var(--font-serif);
      font-size: 1rem;
      line-height: 1.8;
      color: var(--color-text);
      margin: 0 0 0.85rem;
    }

    .reflexao-p:last-of-type { margin-bottom: 1rem; }

    .termo-inline {
      font-weight: 600;
      color: var(--color-primary);
    }

    /* Pills dos parágrafos */
    .cic-refs {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 0.25rem;
    }

    .cic-ref-pill {
      font-family: var(--font-sans);
      font-size: 0.78rem;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 6px;
      padding: 0.25em 0.6em;
      color: var(--color-primary);
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
    }

    .cic-ref-pill:hover,
    .cic-ref-pill.aberta { background: rgba(197,160,40,0.1); border-color: var(--color-accent); }

    /* Card expandido do parágrafo CIC */
    .cic-paragrafo-card {
      margin-top: 0.75rem;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-left: 3px solid var(--color-accent);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      animation: _fadeIn 0.18s ease;
    }

    @keyframes _fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

    .cic-paragrafo-num {
      font-family: var(--font-sans);
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--color-muted);
      margin-bottom: 0.4rem;
    }

    .cic-paragrafo-texto {
      font-family: var(--font-serif);
      font-size: 0.97rem;
      line-height: 1.75;
      color: var(--color-text);
      margin: 0 0 0.75rem;
    }

    .cic-ver-link {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-family: var(--font-sans);
      font-size: 0.78rem;
      color: var(--color-primary);
      text-decoration: none;
      opacity: 0.75;
      transition: opacity 0.12s;
    }

    .cic-ver-link:hover { opacity: 1; }

    /* ── Mobile tabs ──────────────────────────────────────────────────────── */
    .lp-tabs {
      display: none;
      overflow-x: auto;
      gap: 0.25rem;
      padding: 1rem 1.25rem 0;
      scrollbar-width: none;
      border-bottom: 1px solid var(--color-border);
      background: var(--color-surface);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .lp-tabs::-webkit-scrollbar { display: none; }

    .lp-tabs a {
      display: inline-block;
      white-space: nowrap;
      padding: 0.5rem 0.9rem;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--color-muted);
      text-decoration: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.12s, border-color 0.12s;
    }

    .lp-tabs a.ativa {
      color: var(--color-primary);
      border-bottom-color: var(--color-primary);
      font-weight: 600;
    }

    /* ── Responsivo ───────────────────────────────────────────────────────── */
    @media (max-width: 700px) {
      .lp-wrap { flex-direction: column; }

      .lp-sidebar {
        position: static;
        height: auto;
        width: 100%;
        border-right: none;
        border-bottom: none;
        padding: 1.5rem 1.25rem 0;
        flex-direction: column;
        gap: 0;
      }

      .lp-nav, .lp-sidebar-footer { display: none; }
      .lp-tabs { display: flex; }

      .lp-main { padding: 1.25rem 1.25rem 4rem; }

      .leitura-card { padding: 1.25rem 1.25rem; }
    }
  </style>
</head>
<body>

<div class="lp-wrap">

  <!-- ── Sidebar ─────────────────────────────────────────────────────────── -->
  <aside class="lp-sidebar">
    <a href="../" class="lp-back" aria-label="Voltar ao Catecismo">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
      Catecismo da Igreja Católica
    </a>

    <h1 class="lp-titulo">Liturgia<br>do Dia</h1>
    <p class="lp-data" id="lp-data">Carregando…</p>
    <span class="tempo-badge" id="lp-tempo" style="display:none"></span>

    <ul class="lp-nav" id="lp-nav" aria-label="Leituras do dia">
      <!-- preenchido pelo JS -->
    </ul>

    <div class="lp-sidebar-footer" id="area-reflexao" style="display:none">
      <button id="btn-reflexao" type="button">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2z"/><path d="M12 8v4M12 16h.01"/></svg>
        Explicar o Evangelho
      </button>
    </div>
  </aside>

  <!-- ── Tabs mobile ─────────────────────────────────────────────────────── -->
  <nav class="lp-tabs" id="lp-tabs" aria-label="Leituras"></nav>

  <!-- ── Conteúdo ────────────────────────────────────────────────────────── -->
  <main class="lp-main" id="conteudo">
    <p class="loading">Buscando leituras do dia…</p>
  </main>

</div>

<script type="module">

// ── Extrai o livro (ex: "Nm") a partir do HTML de referências ────────────────
function extrairLivro(htmlRef, refSuffix) {
  const escaped = refSuffix.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const m = htmlRef.match(new RegExp('([A-Za-záéíóúàâêôãõç1-9]+(?:\\([^)]+\\))?)\\s+' + escaped));
  return m ? m[1].trim() + ' ' + refSuffix : refSuffix;
}

// ── Separa o salmo da 2ª leitura embutida (quando houver) ────────────────────
function parsearSalmo(salmoObj) {
  const raw = salmoObj.texto ?? '';

  // Separa 2ª Leitura embutida
  const split2a = raw.split(/\n2ª Leitura\s*[-–]\s*/);
  const psalmoRaw = split2a[0];

  let segunda = null;
  if (split2a[1]) {
    const linhas = split2a[1].split('\n').map(l => l.trim()).filter(Boolean);
    // 1ª linha: referência (ex: "Hb 10,4-" ou "Hb 10,4-10")
    const refRaw = linhas[0]?.replace(/-$/, '').trim() ?? '';
    // Encontra início do texto (após "Leitura d...")
    const ini = linhas.findIndex(l => /^Leitura d/i.test(l));
    let textoLinhas = ini >= 0 ? linhas.slice(ini + 1) : linhas.slice(2);
    // Remove Aclamação ao final
    const iacl = textoLinhas.findIndex(l => /Aclamação ao Evangelho|ACLAMAÇÃO/i.test(l));
    if (iacl >= 0) textoLinhas = textoLinhas.slice(0, iacl);
    segunda = { referencia: refRaw, texto: textoLinhas.join('\n') };
  }

  return { psalmoRaw, segunda };
}

// ── Renderiza salmo com Refrão + Estrofes ─────────────────────────────────────
function renderSalmoHtml(texto) {
  if (!texto) return '<em>Texto não disponível.</em>';

  // Remove marcas de execução e strip whitespace
  const linhas = texto
    .replace(/[*†]/g, '')
    .split('\n')
    .map(l => l.trim())
    .filter(Boolean);

  let refrao = [];
  let coletandoRefrao = false;
  let primeiroR = true;
  let estrofes = [];         // array de arrays de linhas
  let estrofeAtual = [];

  for (const linha of linhas) {
    if (linha === 'R.' || linha === 'R') {
      if (primeiroR) {
        primeiroR = false;
        coletandoRefrao = true;
      } else {
        coletandoRefrao = false;
        // Fecha estrofe atual e marca "cantar refrão"
        if (estrofeAtual.length) estrofes.push({ linhas: estrofeAtual, refrao: true });
        estrofeAtual = [];
      }
    } else if (coletandoRefrao) {
      // Verso numérico indica fim do refrão
      if (/^\d+[a-z]?$/.test(linha)) {
        coletandoRefrao = false;
        estrofeAtual.push(linha);
      } else {
        refrao.push(linha);
      }
    } else {
      estrofeAtual.push(linha);
    }
  }
  if (estrofeAtual.length) estrofes.push({ linhas: estrofeAtual, refrao: false });

  let html = '';

  // Refrão
  if (refrao.length) {
    html += `<div class="salmo-refrao"><span class="salmo-r-label">R.</span>${refrao.join('<br>')}</div>`;
  }

  // Estrofes
  for (const estrofe of estrofes) {
    html += `<div class="salmo-estrofe">`;
    for (const linha of estrofe.linhas) {
      if (/^\d+[a-z]?$/.test(linha)) {
        html += `<sup class="vers-num">${linha}</sup>`;
      } else {
        html += linha + ' ';
      }
    }
    html += `</div>`;
    if (estrofe.refrao) html += `<div class="salmo-r-sep">R.</div>`;
  }

  return html;
}

// ── Converte texto CNBB em HTML (leituras gerais) ────────────────────────────
function renderTexto(texto) {
  if (!texto) return '<em>Texto não disponível.</em>';
  const linhas = texto.split('\n').map(l => l.trim()).filter(Boolean);
  let html = '';
  for (const linha of linhas) {
    if (/^Proclamação|^Leitura d|^LEITURA|^EVANGELHO|^Palavra do|^Evangelho do Senhor/.test(linha)) continue;
    if (/^\d+,\d/.test(linha) && linha.length < 20) continue;
    if (/^\d+$/.test(linha)) {
      html += `<sup class="vers-num">${linha}</sup>`;
    } else {
      html += linha + ' ';
    }
  }
  return `<p>${html.trim()}</p>`;
}

function renderCard(label, refDisplay, htmlConteudo, id, isGospel = false) {
  const gospelExtra = isGospel ? `<div id="reflexao-conteudo"></div>` : '';
  return `
    <div class="leitura-card${isGospel ? ' card-evangelho' : ''}" id="${id}">
      <div class="leitura-label">${label}</div>
      <div class="leitura-ref">${refDisplay}</div>
      <div class="leitura-texto">${htmlConteudo}</div>
      ${gospelExtra}
    </div>
  `;
}

function construirNav(leituras) {
  const navEl  = document.getElementById('lp-nav');
  const tabsEl = document.getElementById('lp-tabs');
  navEl.innerHTML  = '';
  tabsEl.innerHTML = '';

  leituras.forEach(({ label, id }, i) => {
    const li = document.createElement('li');
    li.innerHTML = `<a href="#${id}"${i === 0 ? ' class="ativa"' : ''}><span class="nav-dot"></span>${label}</a>`;
    navEl.appendChild(li);

    const a = document.createElement('a');
    a.href = `#${id}`;
    a.textContent = label;
    if (i === 0) a.classList.add('ativa');
    tabsEl.appendChild(a);
  });

  // Highlight ao scroll
  const cards = leituras.map(({ id }) => document.getElementById(id)).filter(Boolean);
  const allLinks = [...navEl.querySelectorAll('a'), ...tabsEl.querySelectorAll('a')];

  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        allLinks.forEach(a => a.classList.toggle('ativa', a.getAttribute('href') === `#${e.target.id}`));
      }
    });
  }, { threshold: 0.3 });

  cards.forEach(c => obs.observe(c));
}

async function init() {
  const hoje  = new Date();
  const dt    = hoje.toISOString().slice(0, 10); // YYYY-MM-DD

  let raw;
  try {
    const r = await fetch(`../data/liturgia/${dt}-leituras.json`);
    if (!r.ok) throw new Error();
    raw = await r.json();
  } catch {
    document.getElementById('conteudo').innerHTML = `<p class="erro">Leituras de hoje não disponíveis.</p>`;
    document.getElementById('lp-data').textContent = '';
    return;
  }

  const dataFmt = hoje.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
  document.getElementById('lp-data').textContent = dataFmt;

  if (raw.titulo) {
    const badge = document.getElementById('lp-tempo');
    badge.textContent = raw.titulo;
    badge.style.display = '';
  }

  const htmlRef = raw.referencias ?? '';
  const pl  = raw.primeira_leitura;
  const sl  = raw.salmo;
  const ev  = raw.evangelho;

  // Referências completas
  const refPL = pl ? extrairLivro(htmlRef, pl.referencia) : '';
  const refEV = ev ? extrairLivro(htmlRef, ev.referencia) : '';
  const refSL = sl?.referencia ?? '';

  // Extrai 2ª leitura embutida no salmo (festas)
  const { psalmoRaw, segunda } = sl ? parsearSalmo(sl) : { psalmoRaw: '', segunda: null };
  const refSL2 = segunda ? (segunda.referencia || extrairLivro(htmlRef, segunda.referencia)) : '';

  const blocos = [
    pl      ? { label: '1ª Leitura', html: renderTexto(pl.texto),        refDisplay: refPL,  id: 'primeira-leitura' } : null,
    sl      ? { label: 'Salmo',      html: renderSalmoHtml(psalmoRaw),    refDisplay: refSL,  id: 'salmo'            } : null,
    segunda ? { label: '2ª Leitura', html: renderTexto(segunda.texto),    refDisplay: refSL2, id: 'segunda-leitura'  } : null,
    ev      ? { label: 'Evangelho',  html: renderTexto(ev.texto),         refDisplay: refEV,  id: 'evangelho'        } : null,
  ].filter(Boolean);

  document.getElementById('conteudo').innerHTML =
    blocos.map(({ label, html, refDisplay, id }) =>
      renderCard(label, refDisplay, html, id, id === 'evangelho')
    ).join('');

  construirNav(blocos);

  if (ev) {
    window._liturgiaData = {
      data: dt,
      evangelhoRef: refEV,
      evangelhoTexto: ev.texto,
    };
    document.getElementById('area-reflexao').style.display = '';
    iniciarReflexao();
  }
}

// ── Reflexão via Grok ─────────────────────────────────────────────────────────
async function iniciarReflexao() {
  const btn = document.getElementById('btn-reflexao');
  const { data, evangelhoRef } = window._liturgiaData;

  // Cache estático primeiro
  try {
    const r = await fetch(`../data/liturgia/${data}-reflexao.json`);
    if (r.ok) {
      renderReflexao(await r.json());
      btn.style.display = 'none';
      return;
    }
  } catch { /* mostra botão */ }

  btn.addEventListener('click', async () => {
    btn.disabled = true;
    btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg> Gerando…`;

    const texto = window._liturgiaData.evangelhoTexto ?? '';

    try {
      const r = await fetch('/api/liturgia-reflexao', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ data, evangelhoRef, evangelhoTexto: texto }),
      });
      if (!r.ok) throw new Error(`Erro ${r.status}`);
      renderReflexao(await r.json());
      btn.style.display = 'none';
    } catch {
      btn.disabled = false;
      btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg> Tentar novamente`;
      const out = document.getElementById('reflexao-conteudo');
      if (out) out.innerHTML = `<p style="color:var(--color-muted);font-size:0.85rem;margin-top:1rem">Não foi possível gerar. Tente novamente.</p>`;
    }
  });
}

// ── Cache do catecismo para lookup inline ────────────────────────────────────
let _catecismo = null;
async function buscarParagrafo(n) {
  if (!_catecismo) {
    const r = await fetch('../data/catecismo.json');
    const d = await r.json();
    _catecismo = d.paragrafos ?? d;
  }
  return _catecismo.find(p => p.numero === n);
}

function renderReflexao(r) {
  const out = document.getElementById('reflexao-conteudo');
  if (!out) return;
  const { termo_grego: t, catecismo: c, fato_curioso: f } = r;

  const nums = c?.paragrafos ?? [];
  const pills = nums.map(n =>
    `<button class="cic-ref-pill" data-n="${n}" aria-expanded="false">§${n}</button>`
  ).join('');

  out.innerHTML = `
    <div class="reflexao-card">
      <div class="ia-badge">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
        Gerado por IA
      </div>

      <p class="reflexao-p"><span class="termo-inline">${t?.termo ?? ''}</span> (${t?.transliteracao ?? ''}) — ${t?.significado ?? ''}</p>
      <p class="reflexao-p">${c?.conexao ?? ''}</p>
      <p class="reflexao-p">${f ?? ''}</p>

      ${pills ? `<div class="cic-refs" id="cic-refs-wrap">${pills}</div><div id="cic-cards"></div>` : ''}
    </div>
  `;

  // Clique nas pills → abre card inline
  out.querySelectorAll('.cic-ref-pill').forEach(btn => {
    btn.addEventListener('click', async () => {
      const n   = Number(btn.dataset.n);
      const wrap = document.getElementById('cic-cards');
      const id  = `cic-card-${n}`;

      // Toggle
      const existing = document.getElementById(id);
      if (existing) {
        existing.remove();
        btn.classList.remove('aberta');
        btn.setAttribute('aria-expanded', 'false');
        return;
      }

      btn.classList.add('aberta');
      btn.setAttribute('aria-expanded', 'true');

      const card = document.createElement('div');
      card.id = id;
      card.className = 'cic-paragrafo-card';
      card.innerHTML = `<p class="cic-paragrafo-num">Carregando §${n}…</p>`;
      wrap.appendChild(card);

      try {
        const p = await buscarParagrafo(n);
        if (p) {
          card.innerHTML = `
            <div class="cic-paragrafo-num">§${p.numero}</div>
            <p class="cic-paragrafo-texto">${p.texto}</p>
            <a class="cic-ver-link" href="/#paragrafo-${p.numero}" target="_blank" rel="noopener">
              Ver no Catecismo
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M7 17L17 7M7 7h10v10"/></svg>
            </a>
          `;
        } else {
          card.innerHTML = `<p class="cic-paragrafo-num">Parágrafo §${n} não encontrado.</p>`;
        }
      } catch {
        card.innerHTML = `<p class="cic-paragrafo-num">Erro ao carregar §${n}.</p>`;
      }
    });
  });
}

init();
</script>
