<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Catecismo da Igreja Católica — Buscador</title>
  <meta name="description" content="Busque os 2865 parágrafos do Catecismo da Igreja Católica em tempo real. Encontre o que a Igreja ensina sobre qualquer tema.">

  <!-- Open Graph -->
  <meta property="og:title"       content="Catecismo da Igreja Católica — Buscador">
  <meta property="og:description" content="Busca em tempo real nos parágrafos do Catecismo.">
  <meta property="og:type"        content="website">
  <meta property="og:image"       content="assets/Catecismo Ill (1).webp">

  <!-- CSS -->
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/search.css">
  <link rel="stylesheet" href="assets/css/panels.css">
  <link rel="stylesheet" href="assets/css/leitor.css">
</head>
<body>

<div id="app" class="estado-inicial">

  <!-- ══════════════════════════════════════════════════════════════
       ESTADO INICIAL — busca centralizada
  ═══════════════════════════════════════════════════════════════ -->
  <section id="hero" aria-label="Busca no Catecismo">

    <img
      src="assets/Catecismo Ill (1).webp"
      alt="Catecismo da Igreja Católica"
      class="logo"
    >

    <h1>Catecismo da<br>Igreja Católica</h1>
    <p class="tagline">Busque o que a Igreja ensina sobre qualquer tema</p>

    <!-- Barra de busca principal (hero) -->
    <div class="campo-busca-container" role="search">
      <svg class="icone-busca" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>

      <label for="campo-busca" class="sr-only">Buscar no Catecismo</label>
      <input
        type="search"
        id="campo-busca"
        autocomplete="off"
        spellcheck="false"
        placeholder="Busque por sacramento, oração, moral…"
        aria-label="Buscar no Catecismo"
        aria-controls="lista-resultados"
        aria-autocomplete="list"
      >

      <button
        id="botao-limpar"
        type="button"
        class="oculto"
        aria-label="Limpar busca"
        title="Limpar (ESC)"
      >×</button>
    </div>

    <!-- Atalhos rápidos por tema -->
    <nav id="temas-rapidos" aria-label="Temas sugeridos">
      <button type="button" data-tema="sacramentos">Sacramentos</button>
      <button type="button" data-tema="oração">Oração</button>
      <button type="button" data-tema="trindade">Trindade</button>
      <button type="button" data-tema="eucaristia">Eucaristia</button>
      <button type="button" data-tema="pecado">Pecado</button>
      <button type="button" data-tema="ressurreição">Ressurreição</button>
      <button type="button" data-tema="maria">Maria</button>
      <button type="button" data-tema="mandamentos">Mandamentos</button>
    </nav>

    <!-- Botão modo leitura -->
    <button id="btn-ler-hero" type="button" aria-label="Ler o Catecismo">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
      </svg>
      Ler o Catecismo
    </button>

  </section>

  <!-- ══════════════════════════════════════════════════════════════
       ESTADO DE BUSCA ATIVA — barra no topo + dois painéis
  ═══════════════════════════════════════════════════════════════ -->

  <!-- Topo fixo com barra de busca -->
  <header id="busca-topo" role="banner" aria-label="Barra de busca">
    <div class="busca-topo-inner">
      <a href="." aria-label="Início" class="btn-home">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9.5z"/>
          <polyline points="9 21 9 12 15 12 15 21"/>
        </svg>
      </a>

      <div id="busca-topo-wrapper" class="campo-busca-container" role="search">
        <svg class="icone-busca" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <!-- O #campo-busca e #botao-limpar são movidos aqui pelo ui.js ao ativar busca -->
      </div>

      <!-- Botão modo leitura -->
      <button id="btn-ler-header" type="button" aria-label="Modo leitura">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
        </svg>
      </button>

      <!-- Botão coletor de trechos -->
      <button id="btn-coletor" type="button" class="oculto" aria-label="Abrir coletor de trechos">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
        </svg>
        <span id="badge-coletor">0</span>
      </button>
    </div>
  </header>

  <!-- Off-canvas: coletor de trechos -->
  <div id="coletor-overlay" class="oculto"></div>
  <aside id="coletor-panel" aria-label="Trechos coletados" aria-hidden="true">
    <div id="coletor-header">
      <span id="coletor-contagem">0 trechos</span>
      <button id="coletor-fechar" type="button" aria-label="Fechar coletor">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M18 6 6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <div id="coletor-lista"></div>

    <div id="coletor-vazio">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
        <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
      </svg>
      <p>Nenhum trecho ainda.</p>
      <p>Clique em <strong>+</strong> num parágrafo para colecionar.</p>
    </div>

    <footer id="coletor-footer">
      <button id="coletor-copiar-tudo" type="button">Copiar tudo</button>
      <button id="coletor-baixar-txt" type="button">↓ TXT</button>
      <button id="coletor-baixar-md" type="button">↓ MD</button>
      <button id="coletor-limpar" type="button" class="coletor-limpar">Limpar</button>
    </footer>
  </aside>

  <!-- Dois painéis -->
  <div id="painel-busca" role="main">

    <!-- Painel esquerdo: lista de resultados -->
    <aside
      id="painel-resultados"
      aria-label="Resultados da busca"
    >
      <div id="resultados-header">
        <span id="contagem-resultados" aria-live="polite" aria-atomic="true"></span>
      </div>

      <div
        id="lista-resultados"
        role="listbox"
        aria-label="Parágrafos encontrados"
        tabindex="0"
      ></div>

      <!-- Mensagem sem resultados -->
      <div id="sem-resultados" class="oculto" role="status">
        <strong>Nenhum resultado encontrado.</strong>
        Tente termos como "graça", "fé", "batismo" ou "oração".
      </div>

    </aside>

    <!-- Painel direito: leitura contínua do Catecismo -->
    <article
      id="painel-conteudo"
      aria-label="Texto do Catecismo"
    >
      <!-- Botão fechar drawer (mobile) -->
      <button id="btn-fechar-conteudo" type="button" aria-label="Voltar aos resultados">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
        Resultados
      </button>

      <!-- Texto completo renderizado pelo ui.js -->
      <div class="placeholder" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25"/>
        </svg>
        <p>Busque um tema para navegar no Catecismo</p>
      </div>

    </article>

    <!-- Navegação prev/next (setas flutuantes) -->
    <div id="nav-paragrafo">
      <button id="nav-anterior" type="button" class="oculto" aria-label="Parágrafo anterior">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M18 15l-6-6-6 6"/>
        </svg>
      </button>
      <button id="nav-proximo" type="button" class="oculto" aria-label="Próximo parágrafo">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M6 9l6 6 6-6"/>
        </svg>
      </button>
    </div>
  </div><!-- #painel-busca -->

  <!-- ══════════════════════════════════════════════════════════════
       MODO LEITURA
  ═══════════════════════════════════════════════════════════════ -->
  <div id="leitor-container" aria-label="Modo leitura">

    <header id="leitor-header">
      <!-- Toggle TOC -->
      <button id="leitor-btn-toc" class="leitor-btn-icon" type="button" aria-label="Índice" aria-expanded="true">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>

      <!-- Breadcrumb -->
      <div id="leitor-breadcrumb"></div>

      <!-- Fechar modo leitura -->
      <button id="leitor-fechar" class="leitor-btn-icon" type="button" aria-label="Fechar modo leitura">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9.5z"/>
          <polyline points="9 21 9 12 15 12 15 21"/>
        </svg>
      </button>
    </header>

    <div id="leitor-body">
      <!-- TOC lateral -->
      <nav id="leitor-toc" aria-label="Índice do Catecismo"></nav>
      <div id="leitor-toc-overlay" aria-hidden="true"></div>

      <!-- Área principal -->
      <div id="leitor-main">
        <div id="leitor-texto" aria-live="polite"></div>

        <!-- Nav capítulos -->
        <div id="leitor-nav-caps">
          <button id="leitor-anterior" class="leitor-nav-btn" type="button">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg>
            <span>Capítulo anterior</span>
          </button>
          <button id="leitor-proximo" class="leitor-nav-btn" type="button">
            <span>Próximo capítulo</span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 18l6-6-6-6"/></svg>
          </button>
        </div>
      </div>
    </div>

  </div><!-- #leitor-container -->

  <!-- Popup de seleção de texto (modo leitura) -->
  <div id="leitor-save-popup" class="oculto" role="dialog" aria-label="Salvar trecho selecionado">
    <button id="leitor-save-btn" type="button">Salvar trecho</button>
  </div>

</div><!-- #app -->

<!-- Módulos JS (ES modules) -->
<script type="module" src="assets/js/coletor.js"></script>
<script type="module" src="assets/js/ui.js"></script>
<script type="module" src="assets/js/router.js"></script>

</body>
</html>
