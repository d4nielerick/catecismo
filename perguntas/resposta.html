<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title id="page-title">Pergunta — Catecismo da Igreja Católica</title>
  <meta name="description" id="page-desc" content="Resposta do Catecismo da Igreja Católica.">

  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="/assets/css/main.css">

  <style>
    .resposta-container {
      max-width: 720px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    .resposta-voltar {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.82rem;
      color: var(--color-muted);
      text-decoration: none;
      margin-bottom: 2rem;
      transition: color 0.15s;
    }
    .resposta-voltar:hover { color: var(--color-primary); }

    .resposta-pergunta {
      font-family: var(--font-serif);
      font-size: clamp(1.3rem, 3vw, 1.9rem);
      font-weight: 500;
      color: var(--color-primary);
      line-height: 1.3;
      margin-bottom: 1.5rem;
    }

    .resposta-texto {
      font-size: 1rem;
      line-height: 1.7;
      color: var(--color-text);
      margin-bottom: 2rem;
      padding: 1.25rem 1.5rem;
      background: rgba(197,160,40,0.07);
      border-left: 3px solid var(--color-accent);
      border-radius: 0 var(--radius) var(--radius) 0;
    }

    .paragrafos-label {
      font-family: var(--font-sans);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--color-muted);
      margin-bottom: 0.75rem;
    }

    .paragrafo-card {
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      margin-bottom: 0.75rem;
      background: var(--color-surface);
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .paragrafo-card:hover {
      border-color: var(--color-accent);
      box-shadow: 0 2px 12px rgba(197,160,40,0.1);
    }

    .paragrafo-num {
      font-family: var(--font-sans);
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--color-accent-dk);
      margin-bottom: 0.3rem;
    }

    .paragrafo-motivo {
      font-size: 0.78rem;
      color: var(--color-muted);
      margin-bottom: 0.5rem;
      font-style: italic;
    }

    .paragrafo-trecho {
      font-family: var(--font-serif);
      font-size: 0.95rem;
      line-height: 1.6;
      color: var(--color-text);
    }

    .paragrafo-abrir {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      margin-top: 0.6rem;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--color-accent-dk);
      text-decoration: none;
      transition: color 0.15s;
    }
    .paragrafo-abrir:hover { color: var(--color-primary); }

    .resposta-footer {
      margin-top: 2.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--color-border);
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .resposta-footer a {
      font-size: 0.82rem;
      color: var(--color-muted);
      text-decoration: none;
      transition: color 0.15s;
    }
    .resposta-footer a:hover { color: var(--color-primary); }

    #loading {
      text-align: center;
      color: var(--color-muted);
      padding: 3rem;
    }
  </style>
</head>
<body>
<div id="app">
  <div class="resposta-container">
    <a href="/perguntas/" class="resposta-voltar">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Todas as perguntas
    </a>

    <div id="loading">Carregando…</div>
    <div id="conteudo" style="display:none">
      <h1 class="resposta-pergunta" id="pergunta"></h1>
      <div class="resposta-texto" id="resposta"></div>
      <div class="paragrafos-label">Parágrafos do Catecismo</div>
      <div id="paragrafos"></div>
      <div class="resposta-footer">
        <a href="/">🔍 Buscar no Catecismo</a>
        <a href="/perguntas/">← Mais perguntas</a>
      </div>
    </div>
  </div>
</div>

<script>
async function carregarResposta() {
  // Slug vem do path: /perguntas/o-que-e-a-eucaristia
  const slug = location.pathname.replace('/perguntas/', '').replace(/\/$/, '');
  if (!slug) { location.href = '/perguntas/'; return; }

  try {
    const res = await fetch(`/data/perguntas/${slug}.json`);
    if (!res.ok) throw new Error('Não encontrado');
    const data = await res.json();

    document.title = `${data.pergunta} — Catecismo`;
    document.getElementById('page-desc').content = data.resposta.substring(0, 160);
    document.getElementById('pergunta').textContent = data.pergunta;
    document.getElementById('resposta').textContent = data.resposta;

    const paragrafosEl = document.getElementById('paragrafos');
    for (const p of data.paragrafos) {
      paragrafosEl.innerHTML += `
        <div class="paragrafo-card">
          <div class="paragrafo-num">§${p.id}</div>
          <div class="paragrafo-motivo">${p.motivo}</div>
          <div class="paragrafo-trecho">${p.trecho}</div>
          <a href="/#paragrafo-${p.id}" class="paragrafo-abrir">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
            Abrir no Catecismo
          </a>
        </div>
      `;
    }

    document.getElementById('loading').style.display = 'none';
    document.getElementById('conteudo').style.display = 'block';
  } catch {
    document.getElementById('loading').textContent = 'Pergunta não encontrada.';
  }
}

carregarResposta();
</script>
</body>
</html>
